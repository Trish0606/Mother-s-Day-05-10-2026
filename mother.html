<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Mom</title>
    <style>
        body { background: linear-gradient(135deg, #e6f3ff, #ffe6f0); height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; color: #333; overflow: hidden; }

        /* 1. THE CASTLE GATE (The Intro) */
        #castle-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; display: flex; transition: opacity 1s; }
        .pane { flex: 1; height: 100%; background: url('castle.jpg') no-repeat center; background-size: cover; transition: transform 2s; border: 2px solid white; }
        .pane-left { transform-origin: left; }
        .pane-right { transform-origin: right; }
        .open .pane-left { transform: rotateY(-110deg); }
        .open .pane-right { transform: rotateY(110deg); }
        #open-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; background: white; border: none; border-radius: 50px; cursor: pointer; font-family: 'Georgia', serif; font-size: 1.2em; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 1001; }

        /* 2. THE BOOK */
        .book { width: 350px; height: 450px; position: relative; perspective: 1000px; }
        .page { position: absolute; width: 100%; height: 100%; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; text-align: center; transform-origin: left; transition: transform 1.2s; border: 2px solid #ffcce6; }
        .flipped { transform: rotateY(-180deg); }

        /* 3. BALLOON HEARTS */
        .balloon { position: absolute; font-size: 30px; pointer-events: none; animation: blow 5s linear forwards; }
        @keyframes blow {
            0% { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-500px) translateX(var(--drift)) scale(1.5); opacity: 0; }
        }

        img { max-width: 100%; max-height: 200px; border-radius: 15px; border: 3px solid #ffb7c5; margin: 20px 0; }
        h1 { color: #d63384; font-size: 24px; }
        button { margin-top: auto; padding: 10px 25px; background: #ff75a0; border: none; border-radius: 25px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="castle-gate">
        <div class="pane pane-left"></div>
        <div class="pane pane-right"></div>
        <button id="open-btn" onclick="openGate()">Open the Gates 🏰</button>
    </div>

    <div class="book">
        <div class="page" id="p1">
            <h2>Dear Mom,</h2>
            <p>You are the heart of our home. Everything I am is because of you. Happy Mother's Day!</p>
            <button onclick="flipPage()">Next →</button>
        </div>
        <div class="page" id="p2">
            <img src="mom.jpg" alt="Mom">
            <h1>Happy Mother's Day!</h1>
            <p>I love you to the moon and back.</p>
        </div>
    </div>

    <script>
        function openGate() {
            document.getElementById('castle-gate').classList.add('open');
            setTimeout(() => document.getElementById('castle-gate').style.display = 'none', 2000);
        }

        function flipPage() {
            document.getElementById('p1').classList.add('flipped');
            setInterval(createBalloon, 400); // Start balloon effect on page 2
        }

        function createBalloon() {
            const b = document.createElement('div');
            b.innerHTML = '💖';
            b.className = 'balloon';
            // Random drift side to side
            b.style.setProperty('--drift', (Math.random() * 200 - 100) + 'px');
            b.style.left = Math.random() * 100 + '%';
            b.style.bottom = '0px';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 5000);
        }
    </script>
</body>
</html>
