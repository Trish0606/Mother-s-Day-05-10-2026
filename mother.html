<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Mom</title>
    <style>
        body { background: #fdf6e3; height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; color: #333; overflow: hidden; }

        /* 1. THE "CASTLE WINDOWS" (No image needed!) */
        #window-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; display: flex; transition: opacity 1s; }
        .shutter { flex: 1; height: 100%; background: #d4a373; border: 5px solid #a3754e; transition: transform 2s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .shutter-left { transform-origin: left; }
        .shutter-right { transform-origin: right; }
        .open .shutter-left { transform: rotateY(-110deg); }
        .open .shutter-right { transform: rotateY(110deg); }
        #open-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; background: #fff; border: 2px solid #d4a373; cursor: pointer; font-family: 'Georgia', serif; font-size: 1.2em; z-index: 1001; border-radius: 10px; }

        /* 2. THE BOOK */
        .book { width: 350px; height: 450px; position: relative; perspective: 1000px; }
        .page { position: absolute; width: 100%; height: 100%; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; text-align: center; transform-origin: left; transition: transform 1.2s; border: 2px solid #ffcce6; }
        .flipped { transform: rotateY(-180deg); }

        /* 3. BALLOON HEARTS */
        .balloon { position: absolute; font-size: 30px; pointer-events: none; animation: floatUp 5s linear forwards; }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-500px) rotate(20deg); opacity: 0; }
        }

        img { max-width: 100%; max-height: 200px; border-radius: 15px; border: 3px solid #ffb7c5; margin: 20px 0; }
        h1 { color: #d63384; font-size: 24px; margin-bottom: 5px; }
        p { font-style: italic; line-height: 1.6; }
        button { margin-top: auto; padding: 10px 25px; background: #ff75a0; border: none; border-radius: 25px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="window-container">
        <div class="shutter shutter-left"></div>
        <div class="shutter shutter-right"></div>
        <button id="open-btn" onclick="openWindows()">Open the Window 🏰</button>
    </div>

    <div class="book">
        <div class="page" id="p1">
            <h2>Dear Mom,</h2>
            <p>Write your poem here. You are the light of my life, the strength in my day, and the love that guides me. Happy Mother's Day!</p>
            <button onclick="flipPage()">Next →</button>
        </div>
        <div class="page" id="p2">
            <img src="mom.jpg" alt="Mom">
            <h1>Happy Mother's Day!</h1>
            <p>I love you to the moon and back.</p>
        </div>
    </div>

    <script>
        function openWindows() {
            document.getElementById('window-container').classList.add('open');
            setTimeout(() => document.getElementById('window-container').style.display = 'none', 2000);
        }

        function flipPage() {
            document.getElementById('p1').classList.add('flipped');
            // Trigger balloon hearts on the second page
            setInterval(createBalloon, 400); 
        }

        function createBalloon() {
            const b = document.createElement('div');
            b.innerHTML = '💖';
            b.className = 'balloon';
            b.style.left = Math.random() * 100 + '%';
            b.style.bottom = '0px';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 5000);
        }
    </script>
</body>
</html>
