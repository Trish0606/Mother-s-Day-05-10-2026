<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Mom</title>
    <style>
        body { background: linear-gradient(135deg, #e6f3ff, #ffe6f0); height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; color: #333; overflow: hidden; }
        
        /* The Book */
        .book { width: 350px; height: 450px; position: relative; z-index: 10; perspective: 1000px; }
        .page { position: absolute; width: 100%; height: 100%; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; text-align: center; transform-origin: left; transition: transform 1.2s; backface-visibility: hidden; border: 2px solid #ffcce6; }
        .flipped { transform: rotateY(-180deg); }

        /* Floating Hearts Animation */
        .heart { position: absolute; font-size: 20px; pointer-events: none; animation: blowUp 4s linear forwards; }
        @keyframes blowUp {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-300px) rotate(45deg); opacity: 0; }
        }

        /* Elements */
        img { max-width: 100%; max-height: 200px; border-radius: 15px; border: 3px solid #ffb7c5; margin-bottom: 15px; }
        h1 { color: #d63384; font-size: 24px; margin: 10px 0; }
        p { font-style: italic; line-height: 1.6; }
        button { margin-top: auto; padding: 10px 25px; background: #ff75a0; border: none; border-radius: 25px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="book" id="book">
        <div class="page" id="p1" style="z-index: 2;">
            <h2>Dear Mom,</h2>
            <p>You are the heart of our home. Thank you for everything you do and for being you. I love you so much.</p>
            <button onclick="revealGift('p1')">Click to Reveal 💖</button>
        </div>
        
        <div class="page" id="p2" style="z-index: 1;">
            <img src="mom.jpg" alt="Mom">
            <h1>Happy Mother's Day!</h1>
            <p>With all my love.</p>
        </div>
    </div>

    <script>
        function revealGift(id) {
            document.getElementById(id).classList.add('flipped');
            
            // Start the blowing hearts
            if (id === 'p1') {
                setInterval(createHeart, 300);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '💖';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.bottom = '10%';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>
</body>
</html>
